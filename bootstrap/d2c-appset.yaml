apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: pepsico-d2c-services
  namespace: argocd
spec:
  generators:
  - git:
      repoURL: https://github.com/JustinoBoggio/pep-d2c-config.git
      revision: main
      directories:
      - path: workloads/* # The scanner will look for any subfolder here
  template:
    metadata:
      name: '{{path.basename}}'
    spec:
      project: default
      source:
        repoURL: https://github.com/JustinoBoggio/pep-d2c-config.git
        targetRevision: main
        path: '{{path}}'
      destination:
        server: https://kubernetes.default.svc
        namespace: '{{path.basename}}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
        - CreateNamespace=true