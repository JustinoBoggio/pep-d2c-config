apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}
  labels:
    app: {{ .Release.Name }}
spec:
  ports:
  - name: http
    port: {{ .Values.service.port }}
    targetPort: {{ required "Error: targetPort is required in values.yaml" .Values.service.targetPort | quote }}
  selector:
    app: {{ .Release.Name }}