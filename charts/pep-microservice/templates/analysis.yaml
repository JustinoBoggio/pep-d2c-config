apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: {{ .Release.Name }}-success-rate
spec:
  args:
  - name: service-name
  metrics:
  - name: success-rate
    successCondition: result[0] <= {{ .Values.canary.errorThreshold }}
    provider:
      prometheus:
        address: http://prometheus-kube-prometheus-prometheus.monitoring.svc.cluster.local:9090
        query: |
          sum(rate(http_requests_total{job="{{ .Release.Name }}", status=~"5.*"}[1m])) 
          / 
          sum(rate(http_requests_total{job="{{ .Release.Name }}"}[1m]))